{% extends 'fleet/base.html' %}

{% block content %}
    <h2>{{ title }}</h2>
    <div class="card p-4 shadow-sm">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success mt-3">Сохранить</button>
            <a href="javascript:history.back()" class="btn btn-secondary mt-3">Отмена</a>
        </form>
    </div>
{% endblock %}
