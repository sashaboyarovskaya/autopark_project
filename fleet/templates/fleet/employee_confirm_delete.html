{% extends 'fleet/base.html' %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger">
                <div class="card-header bg-danger text-white">Удаление сотрудника</div>
                <div class="card-body">
                    <p>Вы действительно хотите удалить сотрудника <strong>{{ employee.username }}</strong>
                        ({{ employee.get_full_name }})?</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Да, удалить</button>
                        <a href="{% url 'employee_list' %}" class="btn btn-secondary">Отмена</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
